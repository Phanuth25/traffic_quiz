name: project2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2 # This satisfies the 'lower-bound' error you saw

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  url_launcher: ^6.3.2
  http: ^1.6.0
  provider: ^6.1.5+1
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  device_preview: ^1.3.1
  rive: ^0.14.4
  dio:  ^5.9.0
  image_picker: ^1.2.1
  khqr_sdk: ^1.0.2
  qr_flutter: ^4.1.0
  flutter_secure_storage: ^10.0.0
  go_router: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: KhmerFont
      fonts:
        - asset: assets/font/KantumruyPro-VariableFont_wght.ttf
          weight: 900

  assets:
    - assets/images/
    - assets/lotties/
    - assets/rive/
    - lib/assignment2/assets/